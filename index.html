<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        .form-title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #4e73df;
        }
        .btn-custom {
            background-color: #4e73df;
            color: white;
            font-weight: 500;
        }
        .btn-custom:hover {
            background-color: #2e59d9;
            color: white;
        }
        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h3 class="form-title">Student Login</h3>

    <form id="loginForm">

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
            
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="text" class="form-control" id="email" placeholder="Enter email" >
            
        </div>

        <!-- Mobile Number -->
        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="number" class="form-control" id="mob_number" placeholder="Enter mobile number" >
            
        </div>

        <!-- User Age -->
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="user_age" placeholder="Enter your age" min="1" max="100">
            
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password">
            
        </div>

        <!-- Submit -->
        <div class="d-grid">
            <button type="submit" class="btn btn-custom">Login & Register</button>
        </div>

        <!-- Success Message -->
        <div class="text-center mt-3">
            <label id="successMessage" class="text-success fw-bold"></label>
        </div>

    </form>

   
</div>

<script>
    const username  = document.getElementById(`username`);
    const number = document.getElementById("mob_number");
    const email = document.getElementById("email");
    const age = document.getElementById("user_age");
    const password = document.getElementById("password");
    const form  = document.getElementById("loginForm");

    form.addEventListener(`submit` , function(e) 
    {
        e.preventDefault();


        if(validateUsername() && validateNumber() &&  validateEmail()  && validateAge() && validatepasssword()){
            alert("login successfull");
//             alert(`Name : ${username.value}
// Email : ${ email.value}
// Number : ${number.value}
// Age : ${age.value}
// Password : ${password.value}`);

            fetch(`/practical7` , {
                method : `post`,
                headers : {"content-type" : "application/json"} ,
                body : JSON.stringify({username : username.value , email : email.value ,
                    number : number.value ,age : age.value , password : password.value})
            }).then(function(response){
                return response.json();
            }).then(function(result){
                // data sent from backend is accessed here 
                alert(`${result.message1}`);
                 location.reload();
            });  
        }
        else{
            alert("Login Failed");
        }

    });
    // Validating  functions example name , password , email , age 

    // USERNAME
    function validateUsername() // empty string  , length of name , 
    {
        if(username.value.trim().length < 3 ){
            alert(`Username must be atleast 3 character`);
        }
        else{
            return true;
        }
    }

    // PHONE NUMBER
    function validateNumber(){
        let num = number.value.trim();

        if(num.length === 10){
            num =parseInt(num);

            if(num > 0 && num!=NaN){
                //  num  = parseInt(num);
                // console.log(typeof num);
                // console.log(num);
                return true;
            }
            else{
            alert(`Number must be 10 digits from 0-9`);
            }
           
        }
        else{
            console.log("error 2222")
            alert(`Number must be 10 digits 0-9`);
        }
    }
        // EMAIL
    function validateEmail() {
        let currentEmail = document.getElementById("email").value.trim();
        let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!pattern.test(currentEmail)) {
            alert(`Enter Valid Email`);  
        } 
        else {
            return true;
        }
        }
    
        function validateAge(){
            if(age.value.trim()>0 && age.value.trim()< 100){
                // console.log(typeof age.value.trim());
                // console.log(`Age of the person ${age.value.trim()}`);
                return true;
            }
            else{
                alert("enter valid age.");
            }
        }

        function validatepasssword(){
            const temppass = password.value.trim();
            if(temppass.length<6){
                alert('Enter Strong password');
            }
            else {
                return true;
            }
        }  
</script>
</body>
</html>
